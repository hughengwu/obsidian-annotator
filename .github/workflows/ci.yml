name: CI
on: push
jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository and submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Lint
      run: |
        npm i --legacy-peer-deps
        npm run lint -- --max-warnings 0

  betterer:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository and submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Check if code became worse
      run: |
        npm i --legacy-peer-deps
        npm run betterer ci
